<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
	<title>小说阅读 · 加载中...</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<!-- ===== 控制栏 ===== -->
	<header class="control-bar" id="controlBar" role="toolbar" aria-label="阅读控制">
		<div class="chapter-label" id="chapterLabel">
			<span id="chapterTitleDisplay">加载中...</span>
			<small>· 小说</small>
		</div>

		<div class="controls-group">
			<div class="theme-toggle" id="themeToggle" role="group" aria-label="主题切换">
				<button data-theme="light" class="active" aria-label="白天模式" title="白天模式">☀️</button>
				<button data-theme="dark" aria-label="黑夜模式" title="黑夜模式">🌙</button>
			</div>
			<span class="divider"></span>
			<div class="font-control" role="group" aria-label="字体大小">
				<button id="fontDecrease" aria-label="减小字号" title="减小字号">A−</button>
				<span class="font-size-display" id="fontSizeDisplay">18</span>
				<button id="fontIncrease" aria-label="增大字号" title="增大字号">A+</button>
			</div>
			<span class="divider"></span>
			<div class="bg-colors" id="bgColors" role="group" aria-label="背景颜色">
				<span id="colorDotsContainer" style="display:contents;"></span>
				<button class="reset-colors-btn" id="resetBgBtn" title="恢复主题默认背景" aria-label="恢复默认背景">↺</button>
			</div>
		</div>
	</header>

	<!-- ===== 页面容器 ===== -->
	<main class="page-container" id="pageContainer">
		<!-- 首页（简介+目录） -->
		<div class="home-page" id="homePage">
			<div class="loading-msg">📖 正在加载小说数据 ...</div>
		</div>

		<!-- 阅读页 -->
		<div class="reading-page" id="readingPage">
			<!-- 动态渲染 -->
		</div>
	</main>

	<script src="script.js"></script>

</body>
</html>
