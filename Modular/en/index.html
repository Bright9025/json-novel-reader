<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
	<title>Novel Reader · Loading...</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<!-- ===== Control Bar ===== -->
	<header class="control-bar" id="controlBar" role="toolbar" aria-label="Reading Controls">
		<div class="chapter-label" id="chapterLabel">
			<span id="chapterTitleDisplay">Loading...</span>
			<small>· Novel</small>
		</div>

		<div class="controls-group">
			<div class="theme-toggle" id="themeToggle" role="group" aria-label="Theme Toggle">
				<button data-theme="light" class="active" aria-label="Light Mode" title="Light Mode">☀️</button>
				<button data-theme="dark" aria-label="Dark Mode" title="Dark Mode">🌙</button>
			</div>
			<span class="divider"></span>
			<div class="font-control" role="group" aria-label="Font Size">
				<button id="fontDecrease" aria-label="Decrease Font Size" title="Decrease Font Size">A−</button>
				<span class="font-size-display" id="fontSizeDisplay">18</span>
				<button id="fontIncrease" aria-label="Increase Font Size" title="Increase Font Size">A+</button>
			</div>
			<span class="divider"></span>
			<div class="bg-colors" id="bgColors" role="group" aria-label="Background Colors">
				<span id="colorDotsContainer" style="display:contents;"></span>
				<button class="reset-colors-btn" id="resetBgBtn" title="Reset to Theme Default" aria-label="Reset Background">↺</button>
			</div>
		</div>
	</header>

	<!-- ===== Page Container ===== -->
	<main class="page-container" id="pageContainer">
		<!-- Home Page (Introduction + Table of Contents) -->
		<div class="home-page" id="homePage">
			<div class="loading-msg">📖 Loading novel data ...</div>
		</div>

		<!-- Reading Page -->
		<div class="reading-page" id="readingPage">
			<!-- Dynamically rendered -->
		</div>
	</main>

	<script src="script.js"></script>

</body>
</html>
